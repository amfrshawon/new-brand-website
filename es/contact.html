<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Ponte en contacto con nuestro equipo." />

  <link rel="stylesheet" href="../assets/css/header.css?v=5" />
  <link rel="stylesheet" href="../assets/css/page.css?v=5" />
<!-- SEO-INJECTED -->
  <link rel="canonical" href="https://amfrshawon.github.io/new-brand-website/es/contact.html" />
  <link rel="alternate" hreflang="en" href="https://amfrshawon.github.io/new-brand-website/contact.html" />
  <link rel="alternate" hreflang="es" href="https://amfrshawon.github.io/new-brand-website/es/contact.html" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CashMyCarTX" />
  <meta property="og:title" content="Contáctanos — CashMyCarTX" />
  <meta property="og:description" content="Ponte en contacto con nuestro equipo." />

  <meta name="twitter:title" content="Contáctanos — CashMyCarTX" />
  <meta name="twitter:description" content="Ponte en contacto con nuestro equipo." />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AutomotiveBusiness",
    "name": "CashMyCarTX",
    "url": "https://amfrshawon.github.io/new-brand-website/",
    "areaServed": {
      "@type": "State",
      "name": "Texas"
    },
    "priceRange": "$$",
    "telephone": "[PHONE NUMBER — update in site-config.js and here]",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "[STREET ADDRESS]",
      "addressLocality": "[CITY]",
      "addressRegion": "TX",
      "postalCode": "[ZIP]",
      "addressCountry": "US"
    }
  }
  </script>
</head>
<body data-page-title="Contáctanos" data-lang="es" data-page-id="contact">
  <div data-include="../partials/header-es.html?v=5"></div>

  <main class="content-area">
    <section class="page-hero">
      <h1>Contáctanos</h1>
      <p>¿Preguntas sobre una oferta, una recogida, o cualquier otra cosa? Estamos aquí para ayudar.</p>
    </section>

    <section class="section-padding container">
      <div class="info-grid">
        <div class="info-card">
          <div class="icon">📞</div>
          <h3>Teléfono</h3>
          <p><a data-bind-href="phoneHref" data-bind="phone" href="tel:1-888-000-0000">1-888-000-0000</a></p>
        </div>
        <div class="info-card">
          <div class="icon">✉️</div>
          <h3>Correo</h3>
          <p><a data-bind-href="emailHref" data-bind="email" href="mailto:info@example.com">info@example.com</a></p>
        </div>
        <div class="info-card">
          <div class="icon">📍</div>
          <h3>Dirección</h3>
          <p data-bind="address.street">[DIRECCIÓN]</p>
          <p><span data-bind="address.city">[CIUDAD]</span>, <span data-bind="address.state">[EST]</span> <span data-bind="address.zip">[CP]</span></p>
        </div>
      </div>

      <!-- Solo maquetado estático — sin backend conectado todavía. Necesita un
           manejador de formulario (Formspree, Netlify Forms, o tu propio endpoint). -->
      <form class="contact-form" onsubmit="return false;">
        <div>
          <label for="name">Nombre</label>
          <input id="name" name="name" type="text" required />
        </div>
        <div>
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" required />
        </div>
        <div>
          <label for="message">Mensaje</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>
        <button class="btn-primary" type="submit">Enviar Mensaje</button>
        <p style="font-size:13px; color:var(--text-gray);">PENDIENTE: conectar este formulario a un manejador de envíos real.</p>
      </form>
    </section>
  </main>

  <div data-include="../partials/footer-es.html?v=5"></div>

  <script src="../assets/js/site-config.js?v=5"></script>
  <script src="../assets/js/include.js?v=5"></script>
  <script src="../assets/js/nav.js?v=5"></script>
</body>
</html>
